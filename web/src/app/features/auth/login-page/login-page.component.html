<section class="page">
  <h1 class="page-title">Sign In</h1>
  <p class="page-lead">Welcome back to Babygirl Society.</p>

  <form class="form" (ngSubmit)="submit()">
    <label class="field">
      <span class="field-label">Email</span>
      <input
        class="field-input"
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        autocomplete="username"
      />
    </label>
    <label class="field">
      <span class="field-label">Password</span>
      <input
        class="field-input"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        autocomplete="current-password"
      />
    </label>
    @if (error()) {
      <p class="err">{{ error() }}</p>
    }
    <button class="bgs-btn-primary submit-btn" type="submit">Sign In</button>
    <p class="back"><a routerLink="/">Back to store</a></p>
  </form>
</section>
