<h2>Shop</h2>
@if (error()) {
  <p class="err">{{ error() }}</p>
}
<div class="grid">
  @for (p of products(); track p.id) {
    <mat-card class="card" appearance="outlined">
      <img mat-card-image [src]="thumb(p)" [alt]="p.name" loading="lazy" />
      <mat-card-title>{{ p.name }}</mat-card-title>
      <mat-card-content>
        <p class="price">{{ p.basePrice | currency: p.currency.toUpperCase() }}</p>
      </mat-card-content>
      <mat-card-actions>
        <a mat-button color="primary" [routerLink]="['/product', p.slug]">View</a>
      </mat-card-actions>
    </mat-card>
  }
</div>
