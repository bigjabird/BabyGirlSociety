<section class="page">
  <h1 class="page-title">{{ title() }}</h1>
  @if (subtitle()) {
    <p class="page-lead">{{ subtitle() }}</p>
  }
  @if (error()) {
    <p class="err">{{ error() }}</p>
  }
  <div class="grid">
    @for (p of products(); track p.id) {
      <article class="product-card">
        <a [routerLink]="['/product', p.slug]" class="product-image-link">
          <img [src]="thumb(p)" [alt]="p.name" loading="lazy" class="product-image" />
        </a>
        <h2 class="product-name">{{ p.name }}</h2>
        <p class="product-price">{{ p.basePrice | currency: p.currency.toUpperCase() }}</p>
        <a [routerLink]="['/product', p.slug]" class="bgs-btn-outline">Choose Options</a>
      </article>
    }
  </div>
</section>
