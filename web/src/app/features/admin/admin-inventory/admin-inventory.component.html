<h2>Inventory</h2>
@if (error()) {
  <p class="err">{{ error() }}</p>
}

<table mat-table [dataSource]="items()" class="mat-elevation-z1">
  <ng-container matColumnDef="sku">
    <th mat-header-cell *matHeaderCellDef>SKU</th>
    <td mat-cell *matCellDef="let row">
      @if (edit[row.id]; as ed) {
        <input class="cell" [(ngModel)]="ed.sku" [name]="'sku-' + row.id" />
      }
    </td>
  </ng-container>
  <ng-container matColumnDef="product">
    <th mat-header-cell *matHeaderCellDef>Product</th>
    <td mat-cell *matCellDef="let row">{{ row.productName }}</td>
  </ng-container>
  <ng-container matColumnDef="qty">
    <th mat-header-cell *matHeaderCellDef>Qty</th>
    <td mat-cell *matCellDef="let row">
      @if (edit[row.id]; as ed) {
        <input class="cell num" type="number" [(ngModel)]="ed.quantityOnHand" [name]="'q-' + row.id" />
      }
    </td>
  </ng-container>
  <ng-container matColumnDef="low">
    <th mat-header-cell *matHeaderCellDef>Low threshold</th>
    <td mat-cell *matCellDef="let row">
      @if (edit[row.id]; as ed) {
        <input class="cell num" type="number" [(ngModel)]="ed.lowStockThreshold" [name]="'l-' + row.id" />
      }
    </td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row">
      <button mat-button color="primary" type="button" (click)="save(row.id)">Save</button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<h3>Add SKU</h3>
<div class="row">
  <mat-form-field appearance="outline">
    <mat-label>Product ID (GUID)</mat-label>
    <input matInput [(ngModel)]="newRow.productId" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>SKU</mat-label>
    <input matInput [(ngModel)]="newRow.sku" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Qty</mat-label>
    <input matInput type="number" [(ngModel)]="newRow.quantityOnHand" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Low threshold</mat-label>
    <input matInput type="number" [(ngModel)]="newRow.lowStockThreshold" />
  </mat-form-field>
  <button mat-raised-button color="primary" type="button" (click)="add()">Add</button>
</div>
