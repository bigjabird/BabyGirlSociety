<h2>Marketing</h2>
@if (error()) {
  <p class="err">{{ error() }}</p>
}

<table mat-table [dataSource]="campaigns()" class="mat-elevation-z1">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let c">{{ c.name }}</td>
  </ng-container>
  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Type</th>
    <td mat-cell *matCellDef="let c">{{ c.type }}</td>
  </ng-container>
  <ng-container matColumnDef="active">
    <th mat-header-cell *matHeaderCellDef>Active</th>
    <td mat-cell *matCellDef="let c">{{ c.isActive ? 'Yes' : 'No' }}</td>
  </ng-container>
  <ng-container matColumnDef="starts">
    <th mat-header-cell *matHeaderCellDef>Starts</th>
    <td mat-cell *matCellDef="let c">{{ c.startsAt | date: 'short' }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let c">
      @if (auth.role() === 'admin') {
        <button mat-button color="warn" type="button" (click)="remove(c)">Delete</button>
      }
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<h3>New campaign</h3>
<div class="grid">
  <mat-form-field appearance="outline">
    <mat-label>Name</mat-label>
    <input matInput [(ngModel)]="form.name" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Type</mat-label>
    <input matInput [(ngModel)]="form.type" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="wide">
    <mat-label>Payload JSON</mat-label>
    <textarea matInput rows="3" [(ngModel)]="form.payloadJson"></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Starts</mat-label>
    <input matInput type="datetime-local" [(ngModel)]="form.startsAt" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Ends (optional)</mat-label>
    <input matInput type="datetime-local" [(ngModel)]="form.endsAt" />
  </mat-form-field>
  <mat-checkbox [(ngModel)]="form.isActive">Active</mat-checkbox>
</div>
<button mat-raised-button color="primary" type="button" (click)="create()">Create</button>
